build:
  maxIssues: 0
  excludeCorrectable: false

config:
  warningsAsErrors: false

complexity:
  CyclomaticComplexMethod:
    active: true
    threshold: 30
  LongMethod:
    active: false
  LongParameterList:
    active: true
    constructorThreshold: 13
    functionThreshold: 9
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 13
  ComplexCondition:
    active: true
    threshold: 5

empty-blocks:
  EmptyFunctionBlock:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false

naming:
  FunctionNaming:
    active: true
    excludes:
      - "**/composable/**"
      - "**/ui/**"
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  MatchingDeclarationName:
    active: false
  MemberNameEqualsClassName:
    active: true

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    active: true
    max: 4
  WildcardImport:
    active: true
  UnusedPrivateProperty:
    active: true
  RedundantVisibilityModifierRule:
    active: true
